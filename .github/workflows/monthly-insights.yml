name: Monthly Insights Generator

on:
  schedule:
    # Runs at 9am EST on the 1st of every month
    - cron: '0 14 1 * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to generate'
        required: false
        default: '3'
      category:
        description: 'Focus category (leave empty for all)'
        required: false
        default: ''

jobs:
  generate-insights:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate insights articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--count ${{ github.event.inputs.count || '3' }}"
          if [ -n "${{ github.event.inputs.category }}" ]; then
            ARGS="$ARGS --category '${{ github.event.inputs.category }}'"
          fi
          node scripts/generate-insights.js $ARGS

      - name: Commit and push new articles
        run: |
          git config user.name "EGR Insights Bot"
          git config user.email "info@egrconsultingservices.com"
          git add insights/ insights.html sitemap.xml
          MONTH=$(date +"%B %Y")
          git diff --cached --quiet || git commit -m "Add monthly insights — ${MONTH}"
          git push
